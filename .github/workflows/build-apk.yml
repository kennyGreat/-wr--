name: Build DataBulge APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp admob.js www/admob.js
          [ -f favicon.ico ] && cp favicon.ico www/ || true
          [ -f favicon-48x48.png ] && cp favicon-48x48.png www/ || true
          [ -f apple-touch-icon.png ] && cp apple-touch-icon.png www/ || true
          [ -f logo-512.png ] && cp logo-512.png www/ || true
          [ -f site.webmanifest ] && cp site.webmanifest www/ || true

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest.xml
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Add internet permission if missing
          if ! grep -q "android.permission.INTERNET" $MANIFEST; then
            sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/' $MANIFEST
          fi
          # Add AdMob App ID if missing
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" $MANIFEST; then
            sed -i 's/<\/application>/    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-9059847852972551~2189539471"\/>\n    <\/application>/' $MANIFEST
          fi
          echo "--- Patched Manifest ---"
          cat $MANIFEST

      - name: Patch build.gradle for minimum SDK
        run: |
          GRADLE=android/app/build.gradle
          # Ensure minSdkVersion is at least 22 (required by AdMob)
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 22/' $GRADLE
          echo "--- Patched build.gradle ---"
          cat $GRADLE

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DataBulge-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
