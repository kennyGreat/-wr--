name: Build DataBulge APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp admob.js www/admob.js
          cp databulge-auth.html www/databulge-auth.html
          [ -f favicon.ico ] && cp favicon.ico www/ || true
          [ -f favicon-48x48.png ] && cp favicon-48x48.png www/ || true
          [ -f apple-touch-icon.png ] && cp apple-touch-icon.png www/ || true
          [ -f logo-512.png ] && cp logo-512.png www/ || true
          [ -f site.webmanifest ] && cp site.webmanifest www/ || true

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install Python icon tools
        run: pip install cairosvg pillow --break-system-packages -q

      - name: Generate and install app icons
        run: |
          python3 << 'EOF'
          import cairosvg, os

          svg = """<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
            <rect x="0" y="0" width="280" height="280" rx="60" fill="#1A56DB"/>
            <circle cx="140" cy="148" r="80" fill="#FFFFFF"/>
            <circle cx="140" cy="148" r="58" fill="#1A56DB"/>
            <rect x="100" y="158" width="15" height="28" rx="5" fill="#FFFFFF"/>
            <rect x="120" y="144" width="15" height="42" rx="5" fill="#FFFFFF"/>
            <rect x="140" y="128" width="15" height="58" rx="5" fill="#FFFFFF"/>
            <rect x="160" y="112" width="15" height="74" rx="5" fill="#FFFFFF"/>
            <circle cx="78" cy="196" r="9" fill="#FFFFFF"/>
          </svg>"""

          svg_bytes = svg.encode('utf-8')
          res = 'android/app/src/main/res'

          sizes = {
            'mipmap-mdpi':    48,
            'mipmap-hdpi':    72,
            'mipmap-xhdpi':   96,
            'mipmap-xxhdpi':  144,
            'mipmap-xxxhdpi': 192,
          }

          for folder, size in sizes.items():
            path = f'{res}/{folder}'
            os.makedirs(path, exist_ok=True)
            for name in ['ic_launcher.png', 'ic_launcher_round.png']:
              cairosvg.svg2png(bytestring=svg_bytes, write_to=f'{path}/{name}', output_width=size, output_height=size)
              print(f'✓ {folder}/{name} ({size}px)')

          print('All icons installed!')
          EOF

      - name: Patch AndroidManifest.xml
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "android.permission.INTERNET" $MANIFEST; then
            sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/' $MANIFEST
          fi
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" $MANIFEST; then
            sed -i 's/<\/application>/    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-9059847852972551~2189539471"\/>\n<\/application>/' $MANIFEST
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DataBulge-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
