name: Build DataBulge APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp admob.js www/admob.js
          [ -f favicon.ico ] && cp favicon.ico www/favicon.ico || true
          [ -f favicon-48x48.png ] && cp favicon-48x48.png www/favicon-48x48.png || true
          [ -f apple-touch-icon.png ] && cp apple-touch-icon.png www/apple-touch-icon.png || true
          [ -f logo-512.png ] && cp logo-512.png www/logo-512.png || true
          [ -f site.webmanifest ] && cp site.webmanifest www/site.webmanifest || true

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DataBulge-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DataBulge-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
