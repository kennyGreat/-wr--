<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataBulge</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0f2b6b;
  color:white;
  text-align:center;
}
.card{
  background:#fff;
  color:#111;
  padding:20px;
  border-radius:20px;
  margin:40px auto;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Buy Data</h2>
  <p>Main App Loaded Successfully</p>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

// ✅ Check session
async function init(){
  const { data } = await supabase.auth.getSession();

  if(!data.session){
    window.location.href = "databulge-auth.html";
  }
}

// ✅ Handle Google return
supabase.auth.onAuthStateChange((event, session) => {
  if(session){
    // Always land on main app
    window.location.href = "index.html";
  }
});

init();
</script>

</body>
</html>
