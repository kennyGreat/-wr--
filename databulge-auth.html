<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataBulge Auth</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0f2b6b;
  color:white;
  text-align:center;
}
.card{
  background:#fff;
  color:#111;
  padding:20px;
  border-radius:20px;
  margin:40px auto;
  width:90%;
  max-width:400px;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
.primary{
  background:#2d5bff;
  color:#fff;
}
.google{
  background:#fff;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="card">
  <h2>Welcome Back</h2>

  <button class="primary">Log In with Email</button>

  <p>OR</p>

  <button class="google" onclick="googleLogin()">
    Continue with Google
  </button>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

// ✅ Redirect if already logged in
async function checkUser(){
  const { data } = await supabase.auth.getSession();
  if(data.session){
    window.location.href = "index.html";
  }
}

checkUser();

// ✅ Google Login
async function googleLogin(){
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/index.html"
    }
  });
}
</script>

</body>
</html>
